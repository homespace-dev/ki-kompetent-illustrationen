<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>KI-Wirkungsebenen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{ --ink:#16171D; --muted:#74757f; --faint:#9a9ba3; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .toolbar{display:flex;justify-content:center;padding:26px 16px 0;}
  .btn{display:inline-flex;align-items:center;font-family:inherit;font-size:14px;font-weight:500;color:#fff;background:var(--ink);
    border:none;border-radius:9px;padding:10px 16px;cursor:pointer;}
  .btn:hover{background:#000;} .btn svg{width:16px;height:16px;margin-right:8px;}
  .wrap{display:flex;justify-content:center;padding:34px 24px 60px;min-height:100vh;
    background:radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, #eceef3 60%);}
  .card{background:transparent;padding:26px 30px;width:880px;}

  .head{text-align:center;margin-bottom:6px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .title{margin:0 0 8px;font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1.1}
  .subtitle{margin:0 auto;font-size:14.5px;color:var(--muted);max-width:560px;line-height:1.5}

  .stack{width:660px;margin:24px auto 0;display:flex;flex-direction:column;gap:14px}
  .band{position:relative;height:96px;border-radius:18px;display:flex;align-items:center;gap:20px;padding:0 28px;color:#fff;overflow:hidden}
  .band .ic{width:48px;height:48px;border-radius:13px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:none}
  .band .ic svg{width:25px;height:25px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .band .k{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.82)}
  .band .n{font-size:24px;font-weight:800;letter-spacing:-0.02em;margin-top:2px}
  .band .no{position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:58px;font-weight:900;color:rgba(255,255,255,.22);letter-spacing:-0.04em}
  .e1{background:linear-gradient(110deg,#6E97D6,#41639E);box-shadow:0 18px 38px -20px rgba(69,103,164,.7)}
  .e2{background:linear-gradient(110deg,#8076C8,#574799);box-shadow:0 18px 38px -20px rgba(90,74,164,.7)}
  .e3{background:linear-gradient(110deg,#CB7C95,#9C4E69);box-shadow:0 18px 38px -20px rgba(160,80,107,.7)}
</style>
</head>
<body>
  <div class="toolbar">
    <button class="btn" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Als PNG herunterladen
    </button>
  </div>

  <div class="wrap">
    <div class="card" id="capture">
      <div class="head">
        <div class="eyebrow">Wie KI Mehrwert schafft</div>
        <h1 class="title">Die drei Wirkungsebenen der KI</h1>
        <p class="subtitle">Von operativer Effizienz über persönliche Produktivität hin zur strategischen Transformation.</p>
      </div>

      <div class="stack">
        <div class="band e1">
          <div class="ic"><svg viewBox="0 0 24 24"><rect width="8" height="8" x="3" y="3" rx="2"/><path d="M7 11v4a2 2 0 0 0 2 2h4"/><rect width="8" height="8" x="13" y="13" rx="2"/></svg></div>
          <div><div class="k">Operativ</div><div class="n">Effizienz</div></div>
          <div class="no">01</div>
        </div>
        <div class="band e2">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg></div>
          <div><div class="k">Persönlich</div><div class="n">Produktivität</div></div>
          <div class="no">02</div>
        </div>
        <div class="band e3">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg></div>
          <div><div class="k">Strategisch</div><div class="n">Transformation</div></div>
          <div class="no">03</div>
        </div>
      </div>
    </div>
  </div>

<script src="illu-export.js"></script>
</body>
</html>
