<style>
  :root{ --ink:#16171D; --muted:#74757f; --page-bg:#eceef3; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);

  .toolbar{display:flex;justify-content:center;padding:26px 16px 0;}

  .tag{margin:18px auto 0;max-width:520px;font-size:15.5px;color:var(--muted);line-height:1.55;}
  .emblem{position:absolute;left:140px;top:556px;width:440px;height:440px;}
